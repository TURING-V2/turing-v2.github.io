baseurl = "https://turing-v2.github.io/"
languageCode = "en-us"
pagination.pagerSize = 7
enableRobotsTXT = true
enableGitInfo = false

# Required for Chroma syntax highlighting
[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"

  themeColor = "red"

  showMenuItems = 3

  showLanguageSelector = false   # single language, no need
  showLastUpdated      = false   # turn on later if you add git info
  fullWidthTheme       = false   # full-width looks stretched on wide screens

  centerTheme = true

  # Auto cover image from cover.jpg/png in post folder
  autoCover = true

  # Reading time shown on posts
  readingTime = true

  # Table of contents off by default (override per-post in front matter)
  Toc = false

  # Date format
  dateFormat = "Jan 02, 2006"

[params.twitter]
  creator = ""
  site = ""

[languages]
  [languages.en]
    languageName = "English"
    title = "PAUL007"

    [languages.en.params]
      subtitle  = "systems. words. edge."
      owner     = "PAUL007"
      keywords  = "systems programming, rust, zig, cuda, compilers, low-latency, writing"
      copyright = "PAUL007"

      # Button/label text
      menuMore           = "more"
      readMore           = "read →"
      readOtherPosts     = "other posts"
      newerPosts         = "newer"
      olderPosts         = "older"
      missingContentMessage    = "nothing here."
      missingBackButtonLabel   = "← back"
      minuteReadingTime  = "min read"
      words              = "words"

      [languages.en.params.logo]
        logoText     = "fsociety@iSSAC113:~$"
        logoHomeLink = "/"

      # ── MENU ──────────────────────────────────────────────────
      [[languages.en.menu.main]]
        identifier = "posts"
        name       = "writing"
        url        = "/posts"
        weight     = 1

      [[languages.en.menu.main]]
        identifier = "about"
        name       = "about"
        url        = "/about"
        weight     = 2

[module]
[[module.imports]]
  path = 'github.com/panr/hugo-theme-terminal/v4'
